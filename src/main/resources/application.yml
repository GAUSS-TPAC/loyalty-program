spring:
  application:
    name: loyaulty-program

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loyalty_db}
    username: ${DB_USER:loyalty_user}
    password: ${DB_PASS:loyalty_pass}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loyalty_db}
    username: ${DB_USER:loyalty_user}
    password: ${DB_PASS:loyalty_pass}
    driver-class-name: org.postgresql.Driver

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loyalty_db}
    user: ${DB_USER:loyalty_user}
    password: ${DB_PASS:loyalty_pass}
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: loyaulty-program
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.yowyob.loyaulty.program.*"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/yowyob}
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8180/realms/yowyob/protocol/openid-connect/certs}

app:
  bonification:
    base-url: ${BONIFICATION_API_URL:http://localhost:8081}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    max-retries: 3
    admin-username: ${BONIFICATION_ADMIN_USERNAME:admin}
    admin-password: ${BONIFICATION_ADMIN_PASSWORD:admin}

  security:
    jwt:
      issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/yowyob}
      jwk-set-uri: ${JWK_SET_URI:http://localhost:8180/realms/yowyob/protocol/openid-connect/certs}
      audience: loyaulty-program
      tenant-id-claim: tenant_id
      user-id-claim: sub
      roles-claim: roles
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://dashboard.yowyob.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

resilience4j:
  circuitbreaker:
    instances:
      bonification-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      bonification-api:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      bonification-api:
        timeout-duration: 5s
